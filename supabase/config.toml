# Supabase CLI + Branching configuration
# Docs: https://supabase.com/docs/reference/config

# Project ref — pins `supabase` CLI to the production project. Overriden on
# preview branches automatically.
project_id = "uudfstpvndurzwnapibf"

[api]
enabled = true
# Ports are local-dev only; production uses default Supabase infra.
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Keep in sync with production Postgres major version.
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

# Local auth config mirrors production so preview branches behave correctly.
[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://wisdombi.ai"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Seed file — runs automatically on preview branch creation and on `supabase db reset`
# locally. Must contain ONLY fake/synthetic data, never production PII.
[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

# Storage buckets (mirrors production)
[storage]
enabled = true
file_size_limit = "50MiB"

# Functions — keep existing
[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# Analytics (optional)
[analytics]
enabled = false

# Realtime
[realtime]
enabled = true
