name: Supabase Migrate (production)

# Applies pending Supabase migrations to PRODUCTION (coaching-platform-prod)
# via `supabase db push`. This replaces reliance on the Supabase GitHub
# integration's prod auto-deploy, which silently stopped applying after the
# migration history was squashed to 00000000000000_baseline_schema.sql.
#
# ─────────────────────────────────────────────────────────────────────────
# GATED — manual trigger only (workflow_dispatch).
#
# The automatic `push: branches: [main]` trigger is intentionally commented
# out. A working pipeline applies ALL pending migrations, and right now the
# only pending ones are the 4 deferred Phase 49 DB-04 FK migrations
# (20260505000000 → 20260508000000), which include an IRREVERSIBLE CASCADE
# and have NOT been signed off for production. Enabling auto-apply before
# those are resolved would deploy them on the next merge to main.
#
# TO ENABLE AUTO-APPLY ON MERGE (after 505–508 are reviewed/decided):
#   1. Apply or remove the 4 deferred migrations so `db push --dry-run`
#      reports no unexpected pending migrations.
#   2. Uncomment the `push:` block below.
# ─────────────────────────────────────────────────────────────────────────
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  Personal/CI access token
#                          (Supabase dashboard → Account → Access Tokens)
#   SUPABASE_DB_PASSWORD   Production database password
#                          (Project Settings → Database → Database password)

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'supabase/migrations/**'

# Never run two prod migrations concurrently; let an in-flight push finish.
concurrency:
  group: supabase-migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    name: db push (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: uudfstpvndurzwnapibf
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Show pending migrations (dry run)
        run: supabase db push --dry-run --password "$SUPABASE_DB_PASSWORD"

      - name: Apply pending migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
